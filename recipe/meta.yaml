{% set versions = {
    "1.37": "ade63b28c13d8e265ef95185326bc311fdf76cd3afe1a2bc44c7ff3f6a19409c"
} %}
{% set tags = {
    "1.37": "v01-37"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}
{% set tag = tags.get(version, "v" + version.replace('.', '-').rjust(5, '0')) %}

{% set name = environ.get('ANACONDA_PACKAGE', 'dd4hep')|string|lower %}
{% set root_tag = (root or '')|replace('.', '') %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/AIDASoft/DD4hep/archive/refs/tags/{{ tag }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  patches:
    # upstream PR #1641 (merged to master 2026-06-18, *after* the v01-37 tag
    # was cut): adds the DD4HEP_USE_G4HEPEM option + DDG4HepEm plugin. Without
    # this, the option doesn't exist in the v01-37 tarball at all.
    - patches/0001-add-g4hepem-plugin-support.patch
    # upstream PR #1645: getpass.getuser() can raise OSError (not just
    # KeyError) on some systems under Python 3.13.
    - patches/0002-fix-getuser-oserror-on-python-3.13.patch
    # conda-forge patches, adopted verbatim (genuinely useful for hep-forge
    # too, not conda-forge-specific): auto-detect C++ standard from ROOT,
    # drop the overly strict Geant4-vs-DD4hep C++ standard hard-FATAL_ERROR
    # (our geant package is C++20, root is C++23 -- see eic-dd4hep-build-plan
    # memory), and dladdr()-based runtime auto-detection of the plugin
    # search path / $DD4hepINSTALL instead of requiring LD_LIBRARY_PATH /
    # DD4hepINSTALL env vars (needed for relocatable conda installs).
    - patches/0003-fix-auto-detect-cxx-standard-from-root.patch
    - patches/0004-fix-remove-overly-strict-geant4-cxx-standard-check.patch
    - patches/0005-fix-auto-detect-plugin-search-path-at-runtime.patch
    - patches/0006-fix-auto-detect-dd4hepinstall-at-runtime.patch
    # local patch: DetectorChecksum.h lives under DDCore/src/plugins (not
    # include/) and isn't installed by default, but downstream key4hep
    # consumers (k4geo/epic) include it directly.
    - patches/0007-install-detectorchecksum-header.patch

build:
  number: 0
  string: "root{{ root_tag }}"
  skip: true  # [win]
  # dd4hep_add_dictionary() (DD4hepBuild.cmake) installs a precompiled
  # ROOT dictionary cache (lib/*.pcm) for DDCore's classes. conda-build's
  # default prefix-relocation does a naive text substitution on every
  # installed file it doesn't know to skip, which corrupts that binary
  # format. Same fix as root-feedstock/root-plus-feedstock use for the
  # identical artifact.
  ignore_prefix_files:
    - lib/*.pcm
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
    - git
  host:
    # geant is published only under the hep-forge "eic" label -- this
    # feedstock's own .github/workflows/autoupload.yml adds that channel
    # (scripts/templates/autoupload.yml deliberately does not, most
    # feedstocks don't need it).
    - root {{ root }}.*
    - geant >=10.2.2
    - g4hepem
    - hepmc>=3.2.6 root{{ root_tag }}
    - edm4hep * root{{ root_tag }}
    - podio * root{{ root_tag }}
    - xerces-c
    - assimp
    - libboost-devel
    - python
  run:
    - root {{ root }}.*
    - geant >=10.2.2
    - g4hepem
    - hepmc>=3.2.6 root{{ root_tag }}
    - edm4hep * root{{ root_tag }}
    - podio * root{{ root_tag }}
    - xerces-c
    - assimp
    - python

test:
  commands:
    - python -c "import dd4hep"
    - ddsim --help
    - test -f "${PREFIX}/lib/libDDCore.so"
    - test -f "${PREFIX}/lib/libDDG4.so"
    - test -f "${PREFIX}/lib/libDDG4HepEm.so"
    - test -f "${PREFIX}/include/DD4hep/DetectorChecksum.h"
    - test -f "${PREFIX}/cmake/DD4hepConfig.cmake"

about:
  home: "https://dd4hep.web.cern.ch/dd4hep/"
  dev_url: "https://github.com/AIDASoft/DD4hep"
  license: "LGPL-3.0-or-later"
  license_file: LICENSE
  summary: "Detector Description Toolkit for High Energy Physics"
  description: |
    DD4hep is a software framework for providing a complete solution for
    full detector description (geometry, materials, visualization,
    readout, alignment, calibration, etc.) for high energy physics
    experiments. It uses the ROOT geometry package and adds support for
    detector alignment, conditions, and simulation with Geant4. Built
    here with +ddg4 +ddcad +edm4hep +g4hepem +hepmc3 +xercesc, matching
    the EIC (eic_xl) variant set -- part of hep-forge's EIC Phase 1
    simulation-chain build-out (geant -> g4hepem -> dd4hep -> epic ->
    npsim, plus acts).

extra:
  recipe-maintainers:
    - meiyasan
